# Declarative instance configuration
# Each entry provisions a pod in minikube.
# Add an entry → pod is created. Remove an entry → pod is deleted.
# Push this file to main → webhook triggers a reconcile automatically.
#
# Available services: redis, postgres
# Available plans:    small

